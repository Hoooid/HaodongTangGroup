<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Ligand-directed quantum dot growth schematic</title>
  <desc id="desc">A schematic showing OT and TMS regulating PbS quantum dot growth, passivation, packing, and photodetector performance.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#426579"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="26" fill="#f8fbfc"/>
  <text x="60" y="74" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#153243">How the strategy works</text>
  <text x="60" y="112" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#5d7280">Double sulfur sources regulate quantum dot growth and reduce loss pathways in the film.</text>
  <g transform="translate(70 170)">
    <rect width="250" height="280" rx="20" fill="#ffffff" stroke="#d5e1e8"/>
    <text x="28" y="50" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#1c7a63">1. Growth</text>
    <text x="28" y="86" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#536b78">OT + TMS tune PbS</text>
    <text x="28" y="113" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#536b78">nanocrystal formation.</text>
    <circle cx="80" cy="180" r="28" fill="#2a9d8f"/>
    <circle cx="140" cy="210" r="28" fill="#1f6feb"/>
    <circle cx="183" cy="160" r="28" fill="#f4a261"/>
    <path d="M105 192 L115 198 M160 191 L167 178" stroke="#8aa0ad" stroke-width="7" stroke-linecap="round"/>
  </g>
  <path d="M345 310 H420" stroke="#426579" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(445 170)">
    <rect width="250" height="280" rx="20" fill="#ffffff" stroke="#d5e1e8"/>
    <text x="28" y="50" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#1f6feb">2. Passivation</text>
    <text x="28" y="86" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#536b78">Surface traps decrease,</text>
    <text x="28" y="113" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#536b78">carrier lifetime improves.</text>
    <g transform="translate(72 158)">
      <polygon points="55,0 110,32 110,96 55,128 0,96 0,32" fill="#dceeff" stroke="#2b75c9" stroke-width="4"/>
      <circle cx="22" cy="34" r="8" fill="#f4a261"/>
      <circle cx="88" cy="94" r="8" fill="#f4a261"/>
      <path d="M10 118 L100 12" stroke="#1c7a63" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
  <path d="M720 310 H795" stroke="#426579" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(820 170)">
    <rect width="300" height="280" rx="20" fill="#ffffff" stroke="#d5e1e8"/>
    <text x="28" y="50" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#b76a12">3. Device</text>
    <text x="28" y="86" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#536b78">Ordered films improve</text>
    <text x="28" y="113" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#536b78">transport and SWIR response.</text>
    <rect x="55" y="184" width="190" height="26" rx="13" fill="#223047"/>
    <rect x="75" y="152" width="150" height="32" rx="16" fill="#1f6feb"/>
    <rect x="98" y="122" width="104" height="30" rx="15" fill="#8bd3c7"/>
    <path d="M62 116 C112 74 188 75 235 112" fill="none" stroke="#f0b35b" stroke-width="6"/>
  </g>
  <g transform="translate(112 506)">
    <rect x="0" y="0" width="976" height="54" rx="27" fill="#eaf5ef"/>
    <text x="28" y="35" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#24495c">Core message: chemistry control at the quantum dot surface becomes device-level signal improvement.</text>
  </g>
</svg>
