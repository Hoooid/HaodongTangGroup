<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">胶体量子点材料图谱</title>
  <desc id="desc">不同胶体量子点材料的响应波段、成熟度和特点比较</desc>
  <rect width="1100" height="650" fill="#fbfdfc"/>
  <text x="50" y="72" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="34" font-weight="700" fill="#173a34">图2 材料选择先决定“能看见哪里”</text>
  <text x="50" y="112" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="22" fill="#61736f">CQD 的优势不是单一材料，而是带隙可调、体系丰富、工艺灵活。</text>
  <line x1="160" y1="500" x2="950" y2="500" stroke="#8aa29b" stroke-width="4"/>
  <g font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="20" fill="#526b65" text-anchor="middle">
    <text x="160" y="535">0.8</text>
    <text x="330" y="535">1.2</text>
    <text x="540" y="535">2.3</text>
    <text x="745" y="535">4</text>
    <text x="950" y="535">10+ um</text>
    <text x="555" y="575">响应波长范围</text>
  </g>
  <g font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="23">
    <rect x="160" y="175" width="380" height="44" rx="22" fill="#58b885"/>
    <text x="60" y="206" fill="#173a34" font-weight="700">PbS</text>
    <text x="565" y="206" fill="#526b65">800-2300 nm，成熟度高，接近规模化应用</text>
    <rect x="250" y="250" width="500" height="44" rx="22" fill="#6ca9bf"/>
    <text x="60" y="281" fill="#173a34" font-weight="700">PbSe</text>
    <text x="775" y="281" fill="#526b65">可到更长波段，但空气稳定性是挑战</text>
    <rect x="315" y="325" width="610" height="44" rx="22" fill="#6d78ad"/>
    <text x="60" y="356" fill="#173a34" font-weight="700">HgTe</text>
    <text x="945" y="356" fill="#526b65">覆盖广，短波到中/长波红外</text>
    <rect x="175" y="400" width="310" height="44" rx="22" fill="#d8b45a"/>
    <text x="60" y="431" fill="#173a34" font-weight="700">Ag 基</text>
    <text x="510" y="431" fill="#526b65">低毒方向，性能和稳定性仍在优化</text>
  </g>
  <rect x="720" y="62" width="300" height="100" rx="18" fill="#fff5ef" stroke="#e3b18d" stroke-width="3"/>
  <text x="748" y="103" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="24" font-weight="700" fill="#cf3d32">发文时要讲清楚：</text>
  <text x="748" y="136" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="20" fill="#526b65">材料不是名字堆砌，而是波段、稳定性、成本和应用取舍。</text>
</svg>
