<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">短波红外探测器关键指标</title>
  <desc id="desc">暗电流、噪声、响应度、响应速度和线性动态范围对成像效果的影响</desc>
  <rect width="1100" height="650" fill="#fbfdfc"/>
  <text x="50" y="72" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="34" font-weight="700" fill="#173a34">图3 指标不是排名表，而是成像问题</text>
  <text x="50" y="112" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="22" fill="#61736f">公众号解读要把每个指标翻译成“画面会变好还是变差”。</text>
  <g font-family="Arial, 'Noto Sans CJK SC', sans-serif">
    <rect x="70" y="185" width="300" height="145" rx="18" fill="#fff" stroke="#d8e7e2" stroke-width="3"/>
    <text x="100" y="232" font-size="27" font-weight="700" fill="#cf3d32">暗电流密度</text>
    <text x="100" y="272" font-size="22" fill="#173a34">背景噪声、黑场、弱光对比度</text>
    <path d="M105 305 C150 270 190 325 240 292 S315 288 340 250" fill="none" stroke="#cf3d32" stroke-width="4"/>
    <rect x="400" y="185" width="300" height="145" rx="18" fill="#fff" stroke="#d8e7e2" stroke-width="3"/>
    <text x="430" y="232" font-size="27" font-weight="700" fill="#cf3d32">响应度 / EQE</text>
    <text x="430" y="272" font-size="22" fill="#173a34">单位光子能不能变成信号</text>
    <circle cx="460" cy="302" r="11" fill="#59b587"/>
    <circle cx="498" cy="302" r="11" fill="#59b587"/>
    <circle cx="536" cy="302" r="11" fill="#59b587"/>
    <path d="M575 302 h80" stroke="#315f75" stroke-width="8" stroke-linecap="round"/>
    <rect x="730" y="185" width="300" height="145" rx="18" fill="#fff" stroke="#d8e7e2" stroke-width="3"/>
    <text x="760" y="232" font-size="27" font-weight="700" fill="#cf3d32">比探测率</text>
    <text x="760" y="272" font-size="22" fill="#173a34">综合灵敏度，弱信号能否被看见</text>
    <path d="M780 305 h210" stroke="#315f75" stroke-width="5"/>
    <circle cx="920" cy="305" r="18" fill="#cf3d32"/>
    <rect x="235" y="390" width="300" height="145" rx="18" fill="#fff" stroke="#d8e7e2" stroke-width="3"/>
    <text x="265" y="437" font-size="27" font-weight="700" fill="#cf3d32">响应速度</text>
    <text x="265" y="477" font-size="22" fill="#173a34">帧率、高速目标、激光脉冲</text>
    <path d="M275 510 H330 V470 H385 V510 H440 V470 H500" fill="none" stroke="#315f75" stroke-width="4"/>
    <rect x="565" y="390" width="300" height="145" rx="18" fill="#fff" stroke="#d8e7e2" stroke-width="3"/>
    <text x="595" y="437" font-size="27" font-weight="700" fill="#cf3d32">线性动态范围</text>
    <text x="595" y="477" font-size="22" fill="#173a34">强弱光同屏时能否保留细节</text>
    <rect x="605" y="500" width="42" height="20" fill="#20313a"/>
    <rect x="660" y="486" width="42" height="34" fill="#587d8f"/>
    <rect x="715" y="468" width="42" height="52" fill="#89b69d"/>
    <rect x="770" y="442" width="42" height="78" fill="#d8b45a"/>
  </g>
</svg>
