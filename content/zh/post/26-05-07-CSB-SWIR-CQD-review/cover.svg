<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">胶体量子点短波红外探测与成像</title>
  <desc id="desc">量子点材料、短波红外光谱、探测器像素阵列和应用场景的示意图</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="1" stop-color="#eaf4f1"/>
    </linearGradient>
    <linearGradient id="swir" x1="0" x2="1">
      <stop offset="0" stop-color="#59b587"/>
      <stop offset="0.55" stop-color="#2f7f92"/>
      <stop offset="1" stop-color="#394f8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#23433d" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="70" y="78" width="1060" height="520" rx="28" fill="#fff" filter="url(#shadow)"/>
  <text x="105" y="144" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="44" font-weight="700" fill="#173a34">胶体量子点短波红外探测与成像</text>
  <text x="108" y="190" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="24" fill="#59706b">从材料带隙调控到读出电路集成的技术路线</text>
  <g transform="translate(120 260)">
