    <circle cx="122" cy="92" r="24" fill="#72c28d"/>
    <circle cx="175" cy="48" r="15" fill="#2f7f92"/>
    <circle cx="210" cy="110" r="20" fill="#9ad6a5"/>
    <circle cx="92" cy="145" r="13" fill="#476a9f"/>
    <circle cx="160" cy="156" r="22" fill="#5e8fb8"/>
    <path d="M86 67 L112 84 M140 84 L164 56 M184 62 L202 96 M106 137 L140 150" stroke="#7a8f8a" stroke-width="4" stroke-linecap="round"/>
    <text x="36" y="215" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="24" font-weight="700" fill="#173a34">CQD 材料</text>
  </g>
  <g transform="translate(430 270)">
