    <line x1="0" y1="105" x2="320" y2="105" stroke="#8aa29b" stroke-width="3"/>
    <g font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="19" fill="#445c57">
      <text x="-8" y="136">0.75</text>
      <text x="133" y="136">1.2</text>
      <text x="288" y="136">3 um</text>
    </g>
    <text x="83" y="35" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="26" font-weight="700" fill="#173a34">SWIR 响应窗口</text>
    <text x="60" y="180" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="22" fill="#59706b">尺寸调控 -> 带隙调控</text>
  </g>
  <g transform="translate(840 250)">
    <rect x="0" y="0" width="205" height="150" rx="18" fill="#eef7f4" stroke="#b9d7cf" stroke-width="3"/>
    <g fill="#315f75">
