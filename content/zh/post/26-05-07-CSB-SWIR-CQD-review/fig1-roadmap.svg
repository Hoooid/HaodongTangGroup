<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">综述文章阅读路线图</title>
  <desc id="desc">材料、薄膜、器件、指标、读出电路和应用之间的路线关系</desc>
  <rect width="1100" height="650" fill="#fbfdfc"/>
  <text x="50" y="72" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="34" font-weight="700" fill="#173a34">图1 这篇综述的阅读路线</text>
  <text x="50" y="112" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="22" fill="#61736f">不要把它看成材料列表，而要看成一条从材料到成像系统的链条。</text>
  <g font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="25" font-weight="700" text-anchor="middle">
    <rect x="60" y="210" width="150" height="110" rx="18" fill="#eaf6ef" stroke="#59a77b" stroke-width="3"/>
    <text x="135" y="256" fill="#173a34">材料体系</text>
    <text x="135" y="292" font-size="18" font-weight="400" fill="#5b6f69">PbS / HgTe / Ag基</text>
    <rect x="260" y="210" width="150" height="110" rx="18" fill="#eef7f4" stroke="#59a77b" stroke-width="3"/>
    <text x="335" y="256" fill="#173a34">薄膜工艺</text>
    <text x="335" y="292" font-size="18" font-weight="400" fill="#5b6f69">配体 / 堆积 / 钝化</text>
    <rect x="460" y="210" width="150" height="110" rx="18" fill="#f5f8ef" stroke="#9dbd69" stroke-width="3"/>
    <text x="535" y="256" fill="#173a34">器件结构</text>
    <text x="535" y="292" font-size="18" font-weight="400" fill="#5b6f69">光导 / 二极管 / 三极管</text>
    <rect x="660" y="210" width="150" height="110" rx="18" fill="#fff5ef" stroke="#db8c58" stroke-width="3"/>
    <text x="735" y="256" fill="#173a34">性能指标</text>
    <text x="735" y="292" font-size="18" font-weight="400" fill="#5b6f69">暗电流 / EQE / 速度</text>
    <rect x="860" y="210" width="150" height="110" rx="18" fill="#f7eef0" stroke="#d86464" stroke-width="3"/>
    <text x="935" y="256" fill="#173a34">成像系统</text>
    <text x="935" y="292" font-size="18" font-weight="400" fill="#5b6f69">CMOS / TFT / 应用</text>
  </g>
  <g stroke="#cf3d32" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M215 265 H252"/>
    <path d="M415 265 H452"/>
    <path d="M615 265 H652"/>
    <path d="M815 265 H852"/>
  </g>
  <g fill="#cf3d32">
    <path d="M252 265 l-13 -8 v16z"/>
    <path d="M452 265 l-13 -8 v16z"/>
    <path d="M652 265 l-13 -8 v16z"/>
    <path d="M852 265 l-13 -8 v16z"/>
  </g>
  <rect x="135" y="420" width="830" height="100" rx="18" fill="#fff" stroke="#d8e7e2" stroke-width="3"/>
  <text x="170" y="462" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="25" font-weight="700" fill="#cf3d32">核心读法：</text>
  <text x="300" y="462" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="25" fill="#173a34">每个材料或工艺选择，最后都要落到图像质量、系统灵敏度和集成成本。</text>
  <text x="170" y="500" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="21" fill="#61736f">这也是公众号式解读要重点讲清楚的地方。</text>
</svg>
