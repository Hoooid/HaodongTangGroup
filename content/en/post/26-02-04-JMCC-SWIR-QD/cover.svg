<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">SWIR quantum dot photodetectors cover</title>
  <desc id="desc">Editorial cover for a paper on ligand-directed PbS quantum dot growth and SWIR photodetectors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5fbff"/>
      <stop offset="0.55" stop-color="#eef7f0"/>
      <stop offset="1" stop-color="#fff7ec"/>
    </linearGradient>
    <linearGradient id="device" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#1c9b76"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1d3557" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.35">
    <circle cx="1000" cy="118" r="170" fill="#b7d8ff"/>
    <circle cx="152" cy="553" r="210" fill="#ccebd9"/>
    <path d="M840 610 C940 500 1024 540 1148 438" fill="none" stroke="#f0b35b" stroke-width="24" stroke-linecap="round"/>
  </g>
  <g transform="translate(100 88)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#196c5d">Journal of Materials Chemistry C</text>
    <text x="0" y="70" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="#102033">Ligand-directed growth control</text>
    <text x="0" y="130" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="800" fill="#102033">for SWIR quantum dot photodetectors</text>
    <text x="0" y="190" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#4b5f6b">PbS quantum dots | surface passivation | 1308 nm EQE 59.1%</text>
  </g>
  <g transform="translate(126 345)" filter="url(#shadow)">
    <rect x="0" y="0" width="410" height="170" rx="22" fill="#ffffff"/>
    <text x="30" y="48" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#153243">Growth chemistry</text>
    <text x="30" y="88" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#1c7a63">OT + TMS</text>
    <text x="30" y="124" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#526571">Double sulfur source regulation</text>
    <g transform="translate(286 48)">
      <circle cx="0" cy="0" r="18" fill="#2a9d8f"/>
      <circle cx="48" cy="28" r="18" fill="#1f6feb"/>
      <circle cx="95" cy="0" r="18" fill="#f4a261"/>
      <path d="M16 8 L32 20 M64 20 L79 8" stroke="#8aa0ad" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
  <g transform="translate(646 330)" filter="url(#shadow)">
    <rect x="0" y="0" width="430" height="205" rx="24" fill="#ffffff"/>
    <rect x="48" y="112" width="330" height="26" rx="13" fill="#223047"/>
    <rect x="88" y="82" width="250" height="30" rx="15" fill="url(#device)" opacity="0.95"/>
    <rect x="118" y="55" width="190" height="27" rx="13.5" fill="#a7d8ff"/>
    <path d="M88 82 C124 36 190 24 238 54 C274 76 312 62 338 82" fill="none" stroke="#f6b85a" stroke-width="5"/>
    <text x="38" y="48" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#153243">Device result</text>
    <text x="38" y="176" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#1f6feb">D* = 8.34 x 10^11 Jones</text>
  </g>
  <text x="100" y="606" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#536b78">Haodong Tang Group | Shenzhen Technology University</text>
</svg>
